name: Publish to npm

on:
  push:
    tags:
      - 'v*'
      - '[0-9]+.*'

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 24
        registry-url: https://registry.npmjs.org

    - name: Upgrade npm for tokenless (OIDC) publishing
      run: npm install -g npm@latest

    - name: Setup Bun
      uses: oven-sh/setup-bun@v1
      with:
        bun-version: latest

    - name: Install dependencies
      run: bun install

    - name: Verify generated docs are up to date
      run: bunx bunosh docs:sync --check

    - name: Run unit tests
      run: bun test tests/unit/

    - name: Build for npm
      run: bun run build:npm

    - name: Verify CLI on Node.js
      run: node dist/bin/explorbot-cli.js --help

    - name: Set version from tag
      id: check
      run: |
        TAG="${GITHUB_REF#refs/tags/}"
        VERSION="${TAG#v}"
        echo "Setting version to $VERSION"
        npm version "$VERSION" --no-git-tag-version
        if [[ "$VERSION" == *beta* || "$VERSION" == *pre* || "$VERSION" == *alpha* || "$VERSION" == *rc* ]]; then
          echo "tag=beta" >> "$GITHUB_OUTPUT"
        else
          echo "tag=latest" >> "$GITHUB_OUTPUT"
        fi

    - name: Publish to npm
      run: npm publish --access public --tag ${{ steps.check.outputs.tag }}
